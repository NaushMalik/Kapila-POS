<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Product - Kapila POS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('dashboard') }}">Kapila POS</a>
            <a href="{{ url_for('products') }}" class="btn btn-outline-light ms-auto">← Back to Products</a>
        </div>
    </nav>

    <div class="container mt-4">
        <h2><i class="bi bi-plus-circle"></i> Add New Product</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ 'danger' if category == 'danger' else 'success' }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-body p-4">
                        <form method="POST" enctype="multipart/form-data">
                            <div class="mb-4">
                                <label class="form-label fw-bold">Product Name</label>
                                <input type="text" class="form-control form-control-lg" name="name" required>
                            </div>

                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Category</label>
                                    <select class="form-select" name="category">
                                        <option value="Rolls">Rolls</option>
                                        <option value="Biryani">Biryani</option>
                                        <option value="Rice">Rice</option>
                                        <option value="Starters">Starters</option>
                                        <option value="Beverages">Beverages</option>
                                        <option value="Other">Other</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Price (₹)</label>
                                    <input type="number" step="0.01" class="form-control form-control-lg" name="price" required>
                                </div>
                            </div>

                            <div class="mt-4">
                                <label class="form-label fw-bold">Product Image (Optional)</label>
                                <input type="file" class="form-control" name="image" accept="image/*">
                                <div class="form-text">JPG, PNG up to 2MB</div>
                            </div>

                            <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                                <a href="{{ url_for('products') }}" class="btn btn-secondary">Cancel</a>
                                <button type="submit" class="btn btn-primary btn-lg px-4">
                                    <i class="bi bi-plus-circle"></i> Add Product
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
