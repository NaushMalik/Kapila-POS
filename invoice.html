
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Invoice - Kapila POS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container-fluid mt-4">
        <div class="row">
            <!-- LEFT SIDE -->
            <div class="col-lg-8">
                <h3 class="mb-3">New Invoice</h3>
                <!-- Customer -->
                <div class="card p-3 mb-3">
                    <div class="row">
                        <div class="col-md-4">
                            <label class="form-label">Customer Name</label>
                            <input class="form-control" name="customer">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Phone</label>
                            <input class="form-control" name="phone">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Payment Mode</label>
                            <select class="form-select">
                                <option>Cash</option>
                                <option>UPI</option>
                                <option>Card</option>
                            </select>
                        </div>
                    </div>
                </div>
                <!-- Items -->
                <div class="card p-3">
                    <h5>Items</h5>
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Product</th>
                                <th>Qty</th>
                                <th>Rate</th>
                                <th>Total</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="itemsBody"></tbody>
                    </table>
                    <button class="btn btn-primary" onclick="addRow()">+ Add Item</button>
                    <div class="text-end mt-3">
                        <h5>Subtotal: ₹<span id="subtotal">0</span></h5>
                        <h4>Grand Total: ₹<span id="grandtotal">0</span></h4>
                    </div>
                    <div class="mt-3 text-end">
                        <button class="btn btn-success">Create Invoice</button>
                    </div>
                </div>
            </div>
            <!-- RIGHT SIDE -->
            <div class="col-lg-4">
                <div class="card p-3">
                    <h5>Quick Products</h5>
                    {% for product in products %}
onclick="quickAdd('{{ product.id }}', '{{ product.name }}', {{ product.price }})">
                        {{ product.name }} - ₹{{ product.price }}
                    </button>

                    {% endfor %}
                </div>
            </div>
        </div>
    </div>
    <script>
        function addRow(name='', price=0) {
            let row = `
                <tr>
                    <td>${name}</td>
                    <td><input type="number" value="1" onchange="calculate()"></td>
                    <td>${price}</td>
                    <td class="rowTotal">${price}</td>
                    <td><button onclick="this.closest('tr').remove(); calculate()">X</button></td>
                </tr>`;
            document.getElementById('itemsBody').innerHTML += row;
            calculate();
        }
        function quickAdd(id, name, price) {
            addRow(name, price);
        }
        function calculate() {
            let total = 0;
            document.querySelectorAll('#itemsBody tr').forEach(row => {
                let qty = parseFloat(row.querySelector('input').value) || 0;
                let price = parseFloat(row.children[2].innerText) || 0;
                let t = qty * price;
                row.querySelector('.rowTotal').innerText = t.toFixed(2);
                total += t;
            });
            document.getElementById('subtotal').innerText = total.toFixed(2);
            document.getElementById('grandtotal').innerText = total.toFixed(2);
        }
    </script>
</body>
</html>
